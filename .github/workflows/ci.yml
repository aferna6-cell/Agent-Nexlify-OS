name: CI

on:
  push:
    branches: ["**"]
  pull_request:

env:
  DATABASE_URL: "file:./prisma/dev.db"
  AUTH_SECRET: "ci-secret"

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Prisma generate + create demo DB
        run: |
          npx prisma generate
          npx prisma db push --skip-generate
      - name: Typecheck
        run: npm run typecheck
      - name: Test (enforces the agent rules)
        run: npm test
      - name: Build
        run: npm run build
